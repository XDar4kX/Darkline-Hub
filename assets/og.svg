<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08080c"/>
      <stop offset="100%" stop-color="#10101a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#4f2ec9"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f0509e" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#f0509e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3ce0c8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#3ce0c8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1a1a26" stroke-width="0.6"/>
    </pattern>
    <filter id="glassBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.5"/>

  <!-- ambient orbs (the mood) -->
  <circle cx="220" cy="180" r="320" fill="url(#orb1)"/>
  <circle cx="1080" cy="500" r="360" fill="url(#orb2)"/>
  <circle cx="900" cy="120" r="220" fill="url(#orb3)"/>

  <!-- glass card -->
  <g filter="url(#glassBlur)">
    <rect x="80" y="100" width="1120" height="440" rx="32" fill="#15151f" fill-opacity="0.55" stroke="#3a3a55" stroke-width="1"/>
  </g>
  <rect x="80" y="100" width="1120" height="440" rx="32" fill="none" stroke="url(#brand)" stroke-width="1.2" opacity="0.45"/>

  <!-- accent strip top of card -->
  <rect x="600" y="98" width="80" height="3" rx="1.5" fill="url(#brand)"/>

  <!-- logo mark -->
  <g transform="translate(140, 220)">
    <rect width="160" height="160" rx="36" fill="#0a0a0e" stroke="url(#brand)" stroke-width="1.5" opacity="0.9"/>
    <g stroke="url(#brand)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 40 38 L 80 122 L 120 38"/>
    </g>
    <circle cx="80" cy="128" r="4" fill="#ffffff"/>
    <circle cx="80" cy="128" r="9" fill="#7c5cfc" fill-opacity="0.3"/>
  </g>

  <!-- wordmark -->
  <text x="340" y="290" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Helvetica, Arial, sans-serif" font-size="120" font-weight="800" fill="#f4f0ff" letter-spacing="-3">Velvet</text>
  <text x="346" y="338" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#a8a3c7" letter-spacing="2">PREMIUM ROBLOX UI LIBRARY</text>

  <!-- tag chips -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">
    <g transform="translate(346, 380)">
      <rect width="92" height="28" rx="14" fill="#1a1a26" stroke="#7c5cfc" stroke-opacity="0.5"/>
      <text x="46" y="19" fill="#cfc6f5" text-anchor="middle">PC + MOBILE</text>
    </g>
    <g transform="translate(450, 380)">
      <rect width="78" height="28" rx="14" fill="#1a1a26" stroke="#7c5cfc" stroke-opacity="0.5"/>
      <text x="39" y="19" fill="#cfc6f5" text-anchor="middle">5 THEMES</text>
    </g>
    <g transform="translate(540, 380)">
      <rect width="118" height="28" rx="14" fill="#1a1a26" stroke="#7c5cfc" stroke-opacity="0.5"/>
      <text x="59" y="19" fill="#cfc6f5" text-anchor="middle">1700+ ICONS</text>
    </g>
    <g transform="translate(670, 380)">
      <rect width="106" height="28" rx="14" fill="#1a1a26" stroke="#7c5cfc" stroke-opacity="0.5"/>
      <text x="53" y="19" fill="#cfc6f5" text-anchor="middle">KEY SYSTEM</text>
    </g>
  </g>

  <!-- footer line -->
  <text x="346" y="468" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#7c6fb8">github.com / DexCodeSX / Velvet</text>

  <!-- tiny status dots top right -->
  <g>
    <circle cx="1140" cy="138" r="6" fill="#3ce0c8"/>
    <circle cx="1158" cy="138" r="6" fill="#f7b250"/>
    <circle cx="1176" cy="138" r="6" fill="#ff5474"/>
  </g>
</svg>
